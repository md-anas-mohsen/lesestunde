# supabase/config.toml
# Used by the Supabase CLI for local development.
# Run `supabase start` to spin up a local Supabase stack.

[api]
port = 54321

[db]
port = 54322

[studio]
port = 54323

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173", "http://localhost:4173"]
jwt_expiry = 3600
enable_signup = true

[auth.external.google]
enabled = true
# Set these via: supabase secrets set GOOGLE_CLIENT_ID=... GOOGLE_CLIENT_SECRET=...
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
